<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>{% block title %}WhatsApp Analytics{% endblock %}</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">

    <div class="logo-section">
        <h2>WA Analytics</h2>
        <p>Behavior & Sentiment System</p>
    </div>

<div class="sidebar-menu">

    <a href="/">Dashboard</a>

    <a href="/#upload-section">Upload Chat</a>

    <a href="/sentiment">Sentiment Analysis</a>

    <a href="/behavior">Behavior Insights</a>

    <a href="/users">User Analytics</a>

    <a href="/evaluation">Model Evaluation</a>

</div>

</div>

<!-- Main Content -->
<div class="main-content">

    <!-- Top Navbar -->
    <div class="top-navbar">


        <div>
            <h2>{% block page_title %}{% endblock %}</h2>

            <p class="text-muted">
                {% block page_subtitle %}
                Intelligent WhatsApp Chat Analytics System
                {% endblock %}
            </p>
        </div>



        <div class="search-box">
            <input type="text" placeholder="Search analytics...">
        </div>

    </div>

    {% block content %}
    {% endblock %}

</div>

<script>

document.getElementById("uploadForm")
.addEventListener("submit", function() {

    let container =
        document.getElementById(
            "uploadProgressContainer"
        );

    let bar =
        document.getElementById(
            "uploadProgressBar"
        );

    container.style.display = "block";

    let width = 0;

    let interval = setInterval(function() {

        if (width >= 90) {

            clearInterval(interval);

        } else {

            width += 10;

            bar.style.width = width + "%";

            bar.innerHTML = width + "%";

        }

    }, 300);

});
</script>
</body>
</html>
